# Configuration file for Palladam Politics Scraper

# Bright Data Scraper API settings
scraper_api:
  api_token: "f04e0356-eb43-4fa9-8ad1-5501c1f31e6a" # Set BRIGHT_DATA_API_TOKEN environment variable
  use_scraper_api: true
  instagram_collector: "c_instagram_posts"
  facebook_collector: "c_facebook_posts"
  youtube_collector: "c_youtube_videos"
  twitter_collector: "c_twitter_posts"

# Platform-specific settings


instagram:
  # Hashtag URLs to scrape
  hashtag_urls:
    - "https://www.instagram.com/explore/tags/palladam/"
    - "https://www.instagram.com/explore/tags/dmk/"
    - "https://www.instagram.com/explore/tags/admk/"
    - "https://www.instagram.com/explore/tags/tvk/"
    - "https://www.instagram.com/explore/tags/stalin/"
    - "https://www.instagram.com/explore/tags/eps/"
    - "https://www.instagram.com/explore/tags/vijay/"

  # Profile URLs to scrape (public profiles only)
  profile_urls: []

  # Limits
  max_posts_per_source: 50
  max_comments_per_post: 20

  # Rate limiting (seconds between requests)
  min_delay: 0.5
  max_delay: 1.0

facebook:
  # Public page URLs to scrape
  page_urls: []

  # Public group URLs to scrape
  group_urls: []

  # Limits
  max_posts_per_source: 50
  max_comments_per_post: 20

  # Rate limiting
  min_delay: 0.5
  max_delay: 1.0

youtube:
  # YouTube Data API key (optional - leave empty to use HTML scraping)
  api_key: ""

  # Channel URLs to scrape
  channel_urls: []

  # Video URLs to scrape directly
  video_urls:
    - "https://www.youtube.com/watch?v=dQw4w9WgXcQ"

  # Limits
  max_videos_per_channel: 30
  max_comments_per_video: 50

  # Rate limiting
  min_delay: 0.5
  max_delay: 1.0

twitter:
  # API credentials
  # Set TWITTER_BEARER_TOKEN environment variable
  bearer_token: ""

  # Search queries (supports Twitter search operators)
  search_queries:
    - "kongu"
    - "dmk stalin"
    - "admk eps"
    - "tvk vijay"
    - "kongu dmk OR kongu டிஎம்கே"
    - "kongu admk OR kongu aiadmk OR kongu அதிமுக"
    - "kongu tvk OR kongu டி.வி.கே"
    - "coimbatore dmk OR coimbatore admk OR coimbatore tvk"
    - "tiruppur dmk OR tiruppur admk"
    - "erode admk OR erode dmk"
    - "salem aiadmk OR salem dmk"
    - "tamil nadu politics"

  # Limits
  max_tweets_per_query: 100
  max_replies_per_tweet: 20

# Keyword filters

filters:
  # DMK keywords (English + Tamil)
  dmk_keywords:
    - "dmk"
    - "டிஎம்கே"

  # ADMK/AIADMK keywords (English + Tamil)
  admk_keywords:
    - "admk"
    - "aiadmk"
    - "அதிமுக"

  # TVK keywords (English + Tamil)
  tvk_keywords:
    - "tvk"
    - "டி.வி.கே"

  # Region keywords for Kongu Belt (English + Tamil)
  region_keywords:
    - "kongu"
    - "கொங்கு"
    - "coimbatore"
    - "கோயம்புத்தூர்"
    - "tiruppur"
    - "திருப்பூர்"
    - "erode"
    - "ஈரோடு"
    - "salem"
    - "சேலம்"

# Export settings

export:
  output_dir: "output"
  csv_filename: "kongu_politics_data.csv"
  jsonl_filename: "kongu_politics_data.jsonl"
  per_region_csv: true

# Deduplication settings

deduplication:
  enable: true
  enable_cross_platform: true
  enable_hash_dedup: false
  storage_path: ".dedup_cache.json"
  hash_threshold: 3
  clear_cache_on_start: false

# General settings

general:
  log_level: "INFO"
  enable_which_platforms:
    - "instagram"
    - "facebook"
    - "youtube"
    - "twitter"

# Google Sheets export settings
# Set enabled: true and fill in spreadsheet_id to push results to a Google Sheet.
# Also set GOOGLE_APPLICATION_CREDENTIALS in your .env file (or environment).

google_sheets:
  enabled: true
  spreadsheet_id: ""            # e.g. "1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms"
  sheet_name: "RawData"         # worksheet tab name for raw records
  summary_tab_name: "Summary"   # worksheet tab name for stats
  credentials_path: ""          # leave empty to use GOOGLE_APPLICATION_CREDENTIALS env var
  append_mode: true             # true = append rows each run; false = overwrite each run
  split_by_region: true         # true = creates one tab per region (e.g. Tiruppur, Coimbatore)

# ── Apify Scraper API ──────────────────────────────────────────────────────────
# Sign up at https://console.apify.com → Settings → API Token
# Or set APIFY_API_TOKEN env var.

apify:
  enabled: true
  api_token: ""                           # or use APIFY_API_TOKEN env var
  instagram_actor: "apify/instagram-scraper"
  facebook_actor: "apify/facebook-pages-scraper"
  twitter_actor: "apify/twitter-scraper"
  youtube_actor: "apify/youtube-scraper"
  max_items_per_run: 50                   # max posts per keyword per run
  comments_per_post: 20                   # comments to fetch per post

# ── Firecrawl Scraper API ──────────────────────────────────────────────────────
# Sign up at https://www.firecrawl.dev → Dashboard → API Keys
# Or set FIRECRAWL_API_KEY env var.

firecrawl:
  enabled: true
  api_key: ""                             # or use FIRECRAWL_API_KEY env var
  urls_to_scrape:
    - "https://www.dmk.in"
    - "https://www.aiadmk.com"
    - "https://www.tvkparty.in"

# ── Multi-Account Credentials ──────────────────────────────────────────────────
# Used as LAST RESORT by Playwright fallback when no sessions are saved.
# Accounts are rotated round-robin; rate-limited accounts are backed off 1 hour.

accounts:
  instagram:
    - username: "barath_magal312"                        # e.g. your_ig_username
      password: "67677903Mn&"
  facebook:
    - username: "Kalai Barath"
      password: "67677903Mn&"
  twitter:
    - username: "@kalaimithu23291"
      password: "67677903Mn&"

# ── Infinite / Continuous Scraping Mode ───────────────────────────────────────
# Activated by --infinite flag in main.py.

infinite_mode:
  delay_minutes: 5              # wait between runs (0 = run as fast as possible)
  max_runs: 0                   # 0 = run forever; N = stop after N runs

# ── MongoDB Storage ────────────────────────────────────────────────────────────
# Set enabled: true and add MONGODB_URI to your .env file.
# Free tier: MongoDB Atlas (https://cloud.mongodb.com) → get SRV connection string.
#
# Example .env entry:
#   MONGODB_URI=mongodb+srv://user:pass@cluster.mongodb.net/?retryWrites=true&w=majority

mongodb:
  enabled: false                # set to true to enable MongoDB upserts
  uri: ""                       # leave empty to use MONGODB_URI env var
  db_name: "palladam_scraper"   # MongoDB database name
  collection: "social_records"  # MongoDB collection name

# ── NLP Pipeline ──────────────────────────────────────────────────────────────
# Adds sentiment + trend score fields to each scraped record.
# Requires: pip install transformers sentencepiece torch
# Model is downloaded on first use (~400 MB).
#
# model options:
#   cardiffnlp/twitter-xlm-roberta-base-sentiment (best for cross-lingual Tamil/Eng)
#   nlptown/bert-base-multilingual-uncased-sentiment

nlp:
  enabled: true                 # set to true to enable NLP enrichment
  model_name: "cardiffnlp/twitter-xlm-roberta-base-sentiment"
  batch_size: 16                # records per inference batch
  trend_window_size: 100        # rolling window size for trend scoring